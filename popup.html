<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }

    .tab-list {
      max-height: 300px;
      overflow-y: auto;
      padding: 8px 0;
    }

    .tab-item {
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    .tab-item img {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .tab-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #333;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tab-count {
      color: #666;
      font-size: 12px;
    }

    .copy-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .copy-btn:hover {
      background: #1557b0;
    }

    .copy-btn.copied {
      background: #188038;
    }

    .empty {
      padding: 24px 16px;
      text-align: center;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>TabStack</h1>
  </div>
  <div id="tab-list" class="tab-list"></div>
  <div class="footer">
    <span id="tab-count" class="tab-count"></span>
    <button id="copy-btn" class="copy-btn">コピー</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
